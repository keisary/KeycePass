<!DOCTYPE html>
<html>
<head><style>
body { background: #f5f5f5; display: flex; gap: 40px; padding: 40px; font-family: system-ui, sans-serif; justify-content: center; flex-wrap: wrap; }
.concept { text-align: center; }
.iconbox { width: 120px; height: 120px; background: white; border-radius: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.iconbox svg { width: 80px; height: 80px; }
.label { font-size: 13px; color: #555; font-weight: 500; }
.desc { font-size: 11px; color: #999; }
</style></head>
<body>
  <div class="concept">
    <div class="iconbox">
      <svg viewBox="0 0 256 256">
        <path d="M128 28 L224 60 L224 136 C224 188 176 216 128 232 C80 216 32 188 32 136 L32 60 Z" fill="none" stroke="#111" stroke-width="10" stroke-linejoin="round"/>
        <path d="M88 132 L112 156 L168 104" fill="none" stroke="#111" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="label">Shield ✓</div>
    <div class="desc">Bouclier + checkmark</div>
  </div>

  <div class="concept">
    <div class="iconbox">
      <svg viewBox="0 0 256 256">
        <rect x="28" y="28" width="200" height="200" rx="48" fill="none" stroke="#111" stroke-width="10"/>
        <path d="M72 198 L72 58 L184 58" fill="none" stroke="#111" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M72 128 L184 198" fill="none" stroke="#111" stroke-width="12" stroke-linecap="round"/>
        <circle cx="180" cy="130" r="6" fill="#111"/>
        <circle cx="160" cy="150" r="4" fill="#111"/>
        <circle cx="170" cy="170" r="5" fill="#111"/>
      </svg>
    </div>
    <div class="label">K + QR</div>
    <div class="desc">K stylisé + dots QR</div>
  </div>

  <div class="concept">
    <div class="iconbox">
      <svg viewBox="0 0 256 256">
        <rect x="28" y="28" width="200" height="200" rx="52" fill="none" stroke="#111" stroke-width="8"/>
        <rect x="56" y="80" width="144" height="96" rx="12" fill="none" stroke="#111" stroke-width="6"/>
        <line x1="56" y1="128" x2="200" y2="128" stroke="#111" stroke-width="4" stroke-dasharray="8 6"/>
        <circle cx="108" cy="106" r="14" fill="none" stroke="#111" stroke-width="4"/>
        <path d="M94 140 Q108 130 122 140" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
        <path d="M160 100 L168 108 L160 116" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M155 94 L170 108 L155 122" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="label">Scan Face</div>
    <div class="desc">Scan presence + visage</div>
  </div>
</body>
</html>
