<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo nœud métallique dans un cercle</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Un nœud torsadé argenté centré dans un cercle épuré sur fond clair</desc>
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dceef5"/>
      <stop offset="100%" stop-color="#c4dce8"/>
    </radialGradient>
    <radialGradient id="knotGrad1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="40%" stop-color="#8ab4c4"/>
      <stop offset="75%" stop-color="#2a4a5a"/>
      <stop offset="100%" stop-color="#0a1a22"/>
    </radialGradient>
    <radialGradient id="knotGrad2" cx="60%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c8dde8"/>
      <stop offset="50%" stop-color="#4a7a90"/>
      <stop offset="100%" stop-color="#0d2530"/>
    </radialGradient>
    <radialGradient id="knotGrad3" cx="40%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#d8eaf2"/>
      <stop offset="45%" stop-color="#5a8fa8"/>
      <stop offset="100%" stop-color="#101e28"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="340" cy="340" r="280"/>
    </clipPath>
  </defs>

  <!-- Fond du cercle -->
  <circle cx="340" cy="340" r="280" fill="url(#bgGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Ombre douce sous le nœud -->
  <ellipse cx="342" cy="415" rx="110" ry="22" fill="#6a9ab0" opacity="0.18" filter="url(#softBlur)" style="fill:rgb(106, 154, 176);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Nœud torsadé — tube principal en boucle (anneau trèfle stylisé) -->
  <!-- Boucle arrière gauche -->
  <path d="M 270 360&#10;    C 235 290, 245 220, 300 218&#10;    C 355 216, 375 265, 355 310&#10;    C 340 345, 310 355, 295 368" fill="none" stroke="url(#knotGrad2)" stroke-width="38" stroke-linecap="round" opacity="0.9" style="fill:none;color:rgb(255, 255, 255);stroke-width:38px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Boucle arrière droite -->
  <path d="M 380 355&#10;    C 430 295, 440 215, 385 210&#10;    C 330 205, 308 255, 325 305&#10;    C 338 342, 370 350, 382 362" fill="none" stroke="url(#knotGrad1)" stroke-width="38" stroke-linecap="round" opacity="0.85" style="fill:none;color:rgb(255, 255, 255);stroke-width:38px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Boucle avant bas -->
  <path d="M 268 378&#10;    C 230 420, 238 480, 280 495&#10;    C 322 510, 362 488, 380 460&#10;    C 398 432, 392 392, 375 368" fill="none" stroke="url(#knotGrad3)" stroke-width="38" stroke-linecap="round" opacity="0.92" style="fill:none;color:rgb(255, 255, 255);stroke-width:38px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.92;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Jonctions / intersections — reflets -->
  <!-- Highlight tube gauche -->
  <path d="M 275 363&#10;    C 242 300, 252 228, 302 222" fill="none" stroke="#c8e0ec" stroke-width="10" stroke-linecap="round" opacity="0.55" style="fill:none;stroke:rgb(200, 224, 236);color:rgb(255, 255, 255);stroke-width:10px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Highlight tube droit -->
  <path d="M 376 358&#10;    C 418 300, 426 222, 380 214" fill="none" stroke="#bdd8e8" stroke-width="9" stroke-linecap="round" opacity="0.45" style="fill:none;stroke:rgb(189, 216, 232);color:rgb(255, 255, 255);stroke-width:9px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Highlight tube bas -->
  <path d="M 272 382&#10;    C 238 425, 246 475, 284 490" fill="none" stroke="#d0e8f2" stroke-width="9" stroke-linecap="round" opacity="0.5" style="fill:none;stroke:rgb(208, 232, 242);color:rgb(255, 255, 255);stroke-width:9px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Ombre intérieure nœud pour profondeur -->
  <path d="M 295 368&#10;    C 310 355, 338 342, 356 312" fill="none" stroke="#0d2230" stroke-width="28" stroke-linecap="round" opacity="0.55" style="fill:none;stroke:rgb(13, 34, 48);color:rgb(255, 255, 255);stroke-width:28px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <path d="M 382 362&#10;    C 370 350, 340 344, 327 307" fill="none" stroke="#0a1e2a" stroke-width="26" stroke-linecap="round" opacity="0.5" style="fill:none;stroke:rgb(10, 30, 42);color:rgb(255, 255, 255);stroke-width:26px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Centre brillant du nœud -->
  <ellipse cx="340" cy="335" rx="18" ry="14" fill="#d8eef8" opacity="0.35" style="fill:rgb(216, 238, 248);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Bordure du logo -->
  <circle cx="340" cy="340" r="280" fill="none" stroke="#6a9ab0" stroke-width="3.5" opacity="0.6" style="fill:none;stroke:rgb(106, 154, 176);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="340" r="273" fill="none" stroke="#c4dce8" stroke-width="1" opacity="0.5" style="fill:none;stroke:rgb(196, 220, 232);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>