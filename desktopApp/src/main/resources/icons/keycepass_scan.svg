<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Minimal rounded square -->
  <rect x="28" y="28" width="200" height="200" rx="52" fill="none" stroke="#000" stroke-width="8"/>
  <!-- Check-in card concept: horizontal line + scan bar -->
  <rect x="56" y="80" width="144" height="96" rx="12" fill="none" stroke="#000" stroke-width="6"/>
  <!-- Scan line -->
  <line x1="56" y1="128" x2="200" y2="128" stroke="#000" stroke-width="4" stroke-dasharray="8 6"/>
  <!-- Face outline inside -->
  <circle cx="108" cy="106" r="14" fill="none" stroke="#000" stroke-width="4"/>
  <path d="M94 140 Q108 130 122 140" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <!-- Wave icon = scan success -->
  <path d="M160 100 L168 108 L160 116" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155 94 L170 108 L155 122" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
